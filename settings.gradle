pluginManagement {
	repositories {
		maven { url = "https://maven.fabricmc.net/" }
		maven { url = "https://maven.minecraftforge.net/" }
		mavenCentral()
		gradlePluginPortal()
	}
}

plugins {
	id "org.gradle.toolchains.foojay-resolver-convention" version "+"
}

include("fabric")
include("forge")
include("transport-simulation-core-source")

project(":transport-simulation-core-source").projectDir = file("decompiled/Transport-Simulation-Core")

rootProject.name = "Minecraft-Transit-Railway"
